<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Общая карта зоопарка – для сотрудников</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #map { flex: 1; z-index: 1; }
        .controls {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid #ccc;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            z-index: 2;
            justify-content: space-between;
        }
        .left-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .right-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .info {
            background: #f0f2f5;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 14px;
            color: #1e466e;
        }
        .filter-group {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-group label {
            font-size: 14px;
            cursor: pointer;
        }
        .filter-group input[type="checkbox"] {
            margin-right: 4px;
        }
        button {
            background: #2c7a47;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-size: 14px;
        }
        button:hover { background: #1e5a36; transform: scale(1.02); }
        .btn-animal { background: #2c7a47; }
        .btn-quest { background: #6c757d; }
        .btn-building { background: #b8860b; }
        .auth-area {
            background: #e9ecef;
            border-radius: 30px;
            padding: 4px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .auth-area input {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
        }
        .auth-area button {
            background: #2c7a47;
            padding: 6px 14px;
            margin: 0;
        }
        .status {
            font-size: 14px;
            background: #f8d7da;
            padding: 4px 12px;
            border-radius: 20px;
            color: #721c24;
        }
        .status.authorized {
            background: #d4edda;
            color: #155724;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 350px;
            max-width: 95%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .modal-card h3 { margin-bottom: 12px; }
        .modal-card input, .modal-card select, .modal-card textarea {
            width: 100%;
            margin: 8px 0;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-family: inherit;
        }
        .modal-card textarea {
            resize: vertical;
            min-height: 60px;
        }
        .modal-card button {
            width: 100%;
            margin-top: 8px;
        }
        .modal-card .btn-close-modal {
            background: #aaa;
        }
        .modal-card .btn-close-modal:hover { background: #888; }
        .nav-link {
            background: #6c757d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            transition: 0.2s;
            font-size: 14px;
        }
        .nav-link:hover { background: #5a6268; }

        /* Общий стиль для иконок с чёткой границей */
        .animal-marker div, .quest-marker div, .building-marker div {
            font-size: 28px;
            text-shadow: 0 0 0 #fff, 0 0 0 #fff, 0 0 0 #fff, 0 0 0 #fff,
                         0 0 4px rgba(0,0,0,0.6), 0 0 4px rgba(0,0,0,0.6),
                         0 0 4px rgba(0,0,0,0.6), 0 0 4px rgba(0,0,0,0.6);
            cursor: grab;
            text-align: center;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
            line-height: 1;
        }
        .animal-marker, .quest-marker, .building-marker {
            background: none !important;
            border: none !important;
        }
        /* Скрыть кнопки добавления до авторизации */
        #addAnimalBtn, #addQuestBtn, #addBuildingBtn {
            display: none;
        }
    </style>
</head>
<body>
<div class="controls">
    <div class="left-controls">
        <button id="addAnimalBtn" class="btn-animal">➕ Добавить животное</button>
        <button id="addQuestBtn" class="btn-quest">📍 Добавить квест</button>
        <button id="addBuildingBtn" class="btn-building">🏢 Добавить здание</button>
        <div class="filter-group">
            <label><input type="checkbox" id="filterAnimals" checked> 🐘 Животные</label>
            <label><input type="checkbox" id="filterQuests" checked> 📍 Квесты</label>
            <label><input type="checkbox" id="filterPublicBuildings" checked> 🏢 Общественные здания</label>
            <label><input type="checkbox" id="filterTechnicalBuildings" checked> 🔧 Технические здания</label>
        </div>
        <a href="index.html" class="nav-link">🐘 Карта животных</a>
        <a href="quest_map.html" class="nav-link">📍 Карта квестов</a>
    </div>
    <div class="right-controls">
        <div class="auth-area">
            <input type="password" id="passwordInput" placeholder="Пароль сотрудника">
            <button id="loginBtn">🔑 Войти</button>
            <div id="authStatus" class="status">👀 Только просмотр</div>
        </div>
    </div>
</div>
<div id="map"></div>

<!-- Модальное окно для животного -->
<div id="animalModal" class="modal">
    <div class="modal-card">
        <h3>Новое животное</h3>
        <input type="text" id="animalName" list="nameOptions" placeholder="Имя (необязательно)">
        <datalist id="nameOptions">
            <option>Бонифаций</option><option>Марфа</option><option>Гоша</option>
            <option>Симба</option><option>Кеша</option><option>Джамбо</option>
            <option>Рокки</option><option>Люся</option><option>Зевс</option>
            <option>Ариэль</option><option>Тиша</option><option>Найда</option>
        </datalist>
        <input type="text" id="animalSpecies" list="speciesOptions" placeholder="Вид *" required>
        <datalist id="speciesOptions">
            <option>Лев</option><option>Тигр</option><option>Слон</option>
            <option>Жираф</option><option>Пингвин</option><option>Медведь</option>
            <option>Обезьяна</option><option>Зебра</option><option>Волк</option>
            <option>Лиса</option><option>Крокодил</option><option>Фламинго</option>
        </datalist>
        <textarea id="animalNote" placeholder="Краткая информация (необязательно)"></textarea>
        <button id="saveAnimalBtn">✨ Создать</button>
        <button id="closeAnimalModal" class="btn-close-modal">Отмена</button>
    </div>
</div>

<!-- Модальное окно для квеста -->
<div id="questModal" class="modal">
    <div class="modal-card">
        <h3>Новый квест</h3>
        <input type="text" id="questName" placeholder="Название квеста *" required>
        <input type="text" id="questDate" placeholder="Дата (например, 15.06.2026)">
        <input type="text" id="questLocationName" placeholder="Название локации (необязательно)">
        <textarea id="questDescription" placeholder="Краткое описание (необязательно)"></textarea>
        <button id="saveQuestBtn">📍 Создать</button>
        <button id="closeQuestModal" class="btn-close-modal">Отмена</button>
    </div>
</div>

<!-- Модальное окно для здания -->
<div id="buildingModal" class="modal">
    <div class="modal-card">
        <h3>Новое здание</h3>
        <input type="text" id="buildingName" placeholder="Название * (например, Виварий)" required>
        <input type="text" id="buildingType" list="buildingTypes" placeholder="Тип (например, администрация)">
        <datalist id="buildingTypes">
            <option>Администрация</option><option>Виварий</option><option>Кормокухня</option>
            <option>Ветеринарный блок</option><option>Склад</option><option>Служебный вход</option>
            <option>Технический корпус</option><option>Котельная</option>
            <option>Медпункт</option><option>Комната матери и ребенка</option>
            <option>Кафе</option><option>Вход</option><option>Туалет</option>
        </datalist>
        <select id="buildingCategory">
            <option value="public">🏢 Общественное</option>
            <option value="technical">🔧 Техническое</option>
        </select>
        <textarea id="buildingDescription" placeholder="Краткое описание (необязательно)"></textarea>
        <button id="saveBuildingBtn">🏢 Создать</button>
        <button id="closeBuildingModal" class="btn-close-modal">Отмена</button>
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDummyExample_DoNotCopy",   // замените на свои
        authDomain: "zoo-map-realtime.firebaseapp.com",
        databaseURL: "https://zoo-map-realtime-default-rtdb.firebaseio.com",
        projectId: "zoo-map-realtime",
        storageBucket: "zoo-map-realtime.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcdef123456"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ========== ССЫЛКИ НА УЗЛЫ ==========
    const animalsRef = db.ref('animals');
    const questsRef = db.ref('quests');
    const buildingsRef = db.ref('buildings');

    // ========== КАРТА ==========
    const zooMapImageUrl = 'zoo_map.png';
    const imageBounds = [[56.00, 92.80], [56.04, 92.94]];

    const map = L.map('map').setView([56.02, 92.87], 15);
    L.imageOverlay(zooMapImageUrl, imageBounds, { opacity: 1, interactive: false }).addTo(map);
    map.fitBounds(imageBounds);
    map.setMaxBounds(imageBounds);
    map.setMinZoom(14);
    map.setMaxZoom(18);

    // ========== ХРАНИЛИЩЕ МАРКЕРОВ ==========
    const markersMap = new Map(); // ключ: 'тип_ид' -> маркер
    let isAuthorized = false;
    const CORRECT_PASSWORD = "zoo2026";

    // Состояния фильтров
    let filterAnimals = true;
    let filterQuests = true;
    let filterPublicBuildings = true;
    let filterTechnicalBuildings = true;

    // ========== ИКОНКИ ==========
    // (используем те же функции, что и в публичных картах, но с cursor: grab когда авторизован)

    function getAnimalIcon(species) {
        const s = (species || "").toLowerCase();
        const mapIcons = {
            "зубр": "🦬", "верблюд": "🐪", "муфлон": "🐏", "косуля": "🦌",
            "винторогий козел": "🐐", "горный козел": "🐐", "пятнистый олень": "🦌",
            "марал": "🦌", "овцебык": "🦬", "лось": "🦌", "гуанако": "🦙",
            "альпака": "🦙", "северный олень": "🦌", "коза": "🐐", "пони": "🐴",
            "мини-лошадь": "🐴", "голубой баран": "🐏", "тапир": "🐗", "пекари": "🐗",
            "гну": "🐃", "орикс": "🐐", "зебра": "🦓", "жираф": "🦒", "осёл": "🐴",
            "овца": "🐑", "валлийская овца": "🐑",
            "дикобраз": "🦔", "пака": "🐭", "мара": "🐰", "заяц": "🐇",
            "белка": "🐿️", "белка-летяга": "🐿️", "белка превоста": "🐿️",
            "лемур": "🐒", "потто": "🐒", "галаго": "🐒", "игрунка": "🐒",
            "тамарин": "🐒", "саймири": "🐒", "капуцин": "🐒", "мангобей": "🐒",
            "колобус": "🐒", "гиббон": "🐒", "шимпанзе": "🐒",
            "хаски": "🐕", "самоедская собака": "🐕", "енотовидная собака": "🦝",
            "лесной хорек": "🦡", "носуха": "🦝", "скунс": "🦨", "енот": "🦝",
            "мангуст": "🦡", "генетта": "🐱", "сурикат": "🦡", "фенек": "🦊",
            "волк": "🐺", "белый медведь": "🐻‍❄️", "бурый медведь": "🐻",
            "медведь бурый тяньшанский": "🐻", "медведь гималайский": "🐻",
            "харза": "🦡", "соболь": "🦡", "барсук": "🦡", "выдра": "🦦",
            "рысь": "🐱", "рысь рыжая": "🐱", "сервал": "🐱", "кот": "🐱",
            "кот бенгальский": "🐱", "кот дальневосточный": "🐱", "леопард": "🐆",
            "пума": "🐆", "тигр": "🐅", "ягуар": "🐆", "лев": "🦁",
            "манул": "🐱", "камышовый кот": "🐱", "лиса": "🦊",
            "валлаби": "🦘", "даман": "🐭", "ёж": "🦔"
        };
        let emoji = "🐾";
        for (let [kw, e] of Object.entries(mapIcons)) {
            if (s.includes(kw)) { emoji = e; break; }
        }
        if (emoji === "🐾") {
            if (s.includes("олень") || s.includes("лось")) emoji = "🦌";
            else if (s.includes("коз") || s.includes("баран") || s.includes("овц")) emoji = "🐐";
            else if (s.includes("лошад") || s.includes("пони")) emoji = "🐴";
            else if (s.includes("медвед")) emoji = "🐻";
            else if (s.includes("обезьян") || s.includes("примат")) emoji = "🐒";
            else if (s.includes("собак") || s.includes("волк")) emoji = "🐺";
            else if (s.includes("лис")) emoji = "🦊";
            else if (s.includes("кот") || s.includes("кошк")) emoji = "🐱";
            else if (s.includes("грызун") || s.includes("белк") || s.includes("заяц")) emoji = "🐭";
        }
        return L.divIcon({
            html: `<div>${emoji}</div>`,
            iconSize: [32, 32],
            popupAnchor: [0, -12],
            className: 'animal-marker'
        });
    }

    function getQuestIcon() {
        return L.divIcon({
            html: `<div>📍</div>`,
            iconSize: [32, 32],
            popupAnchor: [0, -12],
            className: 'quest-marker'
        });
    }

    function getBuildingIcon(name, type, category) {
        const n = (name || "").toLowerCase();
        const t = (type || "").toLowerCase();
        let emoji = "🏢";
        // Сначала по категории, если техническое – отдельный набор, иначе общественные
        if (category === 'technical') {
            if (n.includes("виварий") || n.includes("вивар")) emoji = "🧬";
            else if (n.includes("админ") || n.includes("управл")) emoji = "🏛️";
            else if (n.includes("корм") || n.includes("кухн") || n.includes("пищеблок")) emoji = "🍽️";
            else if (n.includes("вет") || n.includes("клин") || n.includes("лечебн")) emoji = "💉";
            else if (n.includes("склад") || n.includes("хранилищ")) emoji = "📦";
            else if (n.includes("котель") || n.includes("тепл") || n.includes("энерг")) emoji = "🔥";
            else if (n.includes("служеб") || n.includes("технич") || n.includes("хоз")) emoji = "🔧";
            else emoji = "🔧";
        } else { // public
            if (n.includes("медпункт") || n.includes("мед") || n.includes("здрав")) emoji = "🏥";
            else if (n.includes("ребен") || n.includes("дет") || n.includes("матери")) emoji = "👶";
            else if (n.includes("вход") || n.includes("касс") || n.includes("турникет")) emoji = "🚪";
            else if (n.includes("кафе") || n.includes("столовая") || n.includes("буфет")) emoji = "☕";
            else if (n.includes("туалет") || n.includes("wc") || n.includes("санузел")) emoji = "🚻";
            else if (n.includes("парков") || n.includes("автостоянк")) emoji = "🅿️";
            else if (n.includes("магазин") || n.includes("сувенир") || n.includes("киоск")) emoji = "🛍️";
            else if (n.includes("аптек")) emoji = "💊";
            else emoji = "🏢";
        }
        return L.divIcon({
            html: `<div>${emoji}</div>`,
            iconSize: [32, 32],
            popupAnchor: [0, -12],
            className: 'building-marker'
        });
    }

    // ========== ПОПАПЫ ==========
    function createAnimalPopup(animal) {
        let html = `<div style="min-width:140px;">`;
        if (animal.name) html += `<strong>${escapeHtml(animal.name)}</strong><br>`;
        html += `<span>🧬 ${escapeHtml(animal.species)}</span>`;
        if (animal.note) html += `<br><span style="font-size:13px;color:#555;">📝 ${escapeHtml(animal.note)}</span>`;
        if (isAuthorized) {
            html += `<br><button class="delete-btn" data-type="animal" data-id="${animal.id}" style="margin-top:8px; background:#c0392b; color:white; border:none; padding:4px 12px; border-radius:20px; cursor:pointer;">🗑 Удалить</button>`;
        }
        html += `</div>`;
        return html;
    }

    function createQuestPopup(quest) {
        let html = `<div style="min-width:160px;">`;
        if (quest.name) html += `<strong>${escapeHtml(quest.name)}</strong><br>`;
        if (quest.date) html += `<span>📅 ${escapeHtml(quest.date)}</span><br>`;
        if (quest.locationName) html += `<span>📍 ${escapeHtml(quest.locationName)}</span><br>`;
        if (quest.description) html += `<span style="font-size:13px;color:#555;">📝 ${escapeHtml(quest.description)}</span>`;
        if (isAuthorized) {
            html += `<br><button class="delete-btn" data-type="quest" data-id="${quest.id}" style="margin-top:8px; background:#c0392b; color:white; border:none; padding:4px 12px; border-radius:20px; cursor:pointer;">🗑 Удалить</button>`;
        }
        html += `</div>`;
        return html;
    }

    function createBuildingPopup(building) {
        let html = `<div style="min-width:140px;">`;
        if (building.name) html += `<strong>${escapeHtml(building.name)}</strong><br>`;
        if (building.type) html += `<span>🏷️ ${escapeHtml(building.type)}</span>`;
        if (building.category) {
            const catLabel = building.category === 'technical' ? '🔧 Техническое' : '🏢 Общественное';
            html += `<br><span>${catLabel}</span>`;
        }
        if (building.description) html += `<br><span style="font-size:13px;color:#555;">📝 ${escapeHtml(building.description)}</span>`;
        if (isAuthorized) {
            html += `<br><button class="delete-btn" data-type="building" data-id="${building.id}" style="margin-top:8px; background:#c0392b; color:white; border:none; padding:4px 12px; border-radius:20px; cursor:pointer;">🗑 Удалить</button>`;
        }
        html += `</div>`;
        return html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m){
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== УНИВЕРСАЛЬНОЕ ОБНОВЛЕНИЕ МАРКЕРОВ ==========
    function updateOrCreateMarker(data, type, ref) {
        const { id, lat, lng } = data;
        if (!id || lat === undefined || lng === undefined) return;
        const key = type + '_' + id;

        let icon, popupContent;
        if (type === 'animal') {
            icon = getAnimalIcon(data.species);
            popupContent = createAnimalPopup(data);
        } else if (type === 'quest') {
            icon = getQuestIcon();
            popupContent = createQuestPopup(data);
        } else if (type === 'building') {
            icon = getBuildingIcon(data.name, data.type, data.category);
            popupContent = createBuildingPopup(data);
        } else {
            return;
        }

        const draggable = isAuthorized;

        if (markersMap.has(key)) {
            const marker = markersMap.get(key);
            marker.setLatLng([lat, lng]);
            marker.setPopupContent(popupContent);
            marker.setIcon(icon);
            if (draggable) marker.dragging.enable();
            else marker.dragging.disable();
            return;
        }
        const marker = L.marker([lat, lng], { draggable: draggable, icon: icon }).addTo(map);
        marker.bindPopup(popupContent);
        marker.on('dragend', function() {
            if (!isAuthorized) return;
            const newPos = marker.getLatLng();
            ref.child(id).update({ lat: newPos.lat, lng: newPos.lng });
        });
        marker.data = data;
        marker._type = type;
        markersMap.set(key, marker);
        // Применить фильтры (скрыть, если не подходит)
        applyFilters();
    }

    // ========== ФИЛЬТРАЦИЯ ==========
    function applyFilters() {
        markersMap.forEach((marker) => {
            const type = marker._type;
            let visible = true;
            if (type === 'animal') visible = filterAnimals;
            else if (type === 'quest') visible = filterQuests;
            else if (type === 'building') {
                const category = marker.data?.category;
                if (category === 'public') visible = filterPublicBuildings;
                else if (category === 'technical') visible = filterTechnicalBuildings;
                else visible = filterPublicBuildings; // по умолчанию общественное
            }
            if (visible) {
                if (!map.hasLayer(marker)) marker.addTo(map);
            } else {
                if (map.hasLayer(marker)) map.removeLayer(marker);
            }
        });
    }

    // Подписка на события чекбоксов
    document.getElementById('filterAnimals').addEventListener('change', function() {
        filterAnimals = this.checked;
        applyFilters();
    });
    document.getElementById('filterQuests').addEventListener('change', function() {
        filterQuests = this.checked;
        applyFilters();
    });
    document.getElementById('filterPublicBuildings').addEventListener('change', function() {
        filterPublicBuildings = this.checked;
        applyFilters();
    });
    document.getElementById('filterTechnicalBuildings').addEventListener('change', function() {
        filterTechnicalBuildings = this.checked;
        applyFilters();
    });

    // ========== УПРАВЛЕНИЕ ДОСТУПАМИ ==========
    function setAuthorization(authorized) {
        isAuthorized = authorized;
        const btns = ['addAnimalBtn', 'addQuestBtn', 'addBuildingBtn'];
        const statusDiv = document.getElementById('authStatus');
        btns.forEach(id => {
            const btn = document.getElementById(id);
            if (authorized) btn.style.display = 'block';
            else btn.style.display = 'none';
        });
        if (authorized) {
            statusDiv.innerHTML = '✅ Сотрудник (полный доступ)';
            statusDiv.className = 'status authorized';
            // Обновить все маркеры: включить перетаскивание и обновить попапы (добавить кнопки удаления)
            markersMap.forEach((marker) => {
                marker.dragging.enable();
                const type = marker._type;
                const data = marker.data;
                let popup;
                if (type === 'animal') popup = createAnimalPopup(data);
                else if (type === 'quest') popup = createQuestPopup(data);
                else if (type === 'building') popup = createBuildingPopup(data);
                if (popup) marker.setPopupContent(popup);
                // Обновить иконку (может поменяться курсор)
                if (type === 'animal') marker.setIcon(getAnimalIcon(data.species));
                else if (type === 'quest') marker.setIcon(getQuestIcon());
                else if (type === 'building') marker.setIcon(getBuildingIcon(data.name, data.type, data.category));
            });
        } else {
            statusDiv.innerHTML = '👀 Только просмотр';
            statusDiv.className = 'status';
            markersMap.forEach((marker) => {
                marker.dragging.disable();
                const type = marker._type;
                const data = marker.data;
                let popup;
                if (type === 'animal') popup = createAnimalPopup(data);
                else if (type === 'quest') popup = createQuestPopup(data);
                else if (type === 'building') popup = createBuildingPopup(data);
                if (popup) marker.setPopupContent(popup);
                if (type === 'animal') marker.setIcon(getAnimalIcon(data.species));
                else if (type === 'quest') marker.setIcon(getQuestIcon());
                else if (type === 'building') marker.setIcon(getBuildingIcon(data.name, data.type, data.category));
            });
        }
        // Перепривязать события кнопок удаления (они создаются динамически)
        setTimeout(attachDeleteEvents, 100);
    }

    function attachDeleteEvents() {
        document.querySelectorAll('.delete-btn').forEach(btn => {
            if (btn.dataset.listener) return;
            btn.dataset.listener = 'true';
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (!isAuthorized) return alert("Доступ только для сотрудников");
                const type = this.dataset.type;
                const id = this.dataset.id;
                if (!id) return;
                let ref;
                if (type === 'animal') ref = animalsRef;
                else if (type === 'quest') ref = questsRef;
                else if (type === 'building') ref = buildingsRef;
                if (ref && confirm('Удалить объект?')) {
                    ref.child(id).remove().catch(err => alert('Ошибка удаления: ' + err.message));
                }
            });
        });
    }

    // ========== СЛУШАТЕЛИ FIREBASE ==========
    animalsRef.on('child_added', function(snapshot) {
        const data = snapshot.val();
        data.id = snapshot.key;
        updateOrCreateMarker(data, 'animal', animalsRef);
    });
    animalsRef.on('child_changed', function(snapshot) {
        const data = snapshot.val();
        data.id = snapshot.key;
        updateOrCreateMarker(data, 'animal', animalsRef);
    });
    animalsRef.on('child_removed', function(snapshot) {
        const id = snapshot.key;
        const key = 'animal_' + id;
        if (markersMap.has(key)) {
            map.removeLayer(markersMap.get(key));
            markersMap.delete(key);
        }
    });

    questsRef.on('child_added', function(snapshot) {
        const data = snapshot.val();
        data.id = snapshot.key;
        updateOrCreateMarker(data, 'quest', questsRef);
    });
    questsRef.on('child_changed', function(snapshot) {
        const data = snapshot.val();
        data.id = snapshot.key;
        updateOrCreateMarker(data, 'quest', questsRef);
    });
    questsRef.on('child_removed', function(snapshot) {
        const id = snapshot.key;
        const key = 'quest_' + id;
        if (markersMap.has(key)) {
            map.removeLayer(markersMap.get(key));
            markersMap.delete(key);
        }
    });

    buildingsRef.on('child_added', function(snapshot) {
        const data = snapshot.val();
        data.id = snapshot.key;
        updateOrCreateMarker(data, 'building', buildingsRef);
    });
    buildingsRef.on('child_changed', function(snapshot) {
        const data = snapshot.val();
        data.id = snapshot.key;
        updateOrCreateMarker(data, 'building', buildingsRef);
    });
    buildingsRef.on('child_removed', function(snapshot) {
        const id = snapshot.key;
        const key = 'building_' + id;
        if (markersMap.has(key)) {
            map.removeLayer(markersMap.get(key));
            markersMap.delete(key);
        }
    });

    // ========== АВТОРИЗАЦИЯ ==========
    document.getElementById('loginBtn').onclick = function() {
        const pwd = document.getElementById('passwordInput').value;
        if (pwd === CORRECT_PASSWORD) {
            setAuthorization(true);
            document.getElementById('passwordInput').value = '';
        } else {
            alert('Неверный пароль');
            setAuthorization(false);
        }
    };
    setAuthorization(false);

    // ========== МОДАЛЬНЫЕ ОКНА ==========
    // Животные
    const animalModal = document.getElementById('animalModal');
    document.getElementById('addAnimalBtn').onclick = function() {
        if (!isAuthorized) return alert("Только для сотрудников");
        animalModal.style.display = 'flex';
        document.getElementById('animalName').value = '';
        document.getElementById('animalSpecies').value = '';
        document.getElementById('animalNote').value = '';
    };
    document.getElementById('closeAnimalModal').onclick = function() { animalModal.style.display = 'none'; };
    document.getElementById('saveAnimalBtn').onclick = function() {
        if (!isAuthorized) return;
        const name = document.getElementById('animalName').value.trim();
        const species = document.getElementById('animalSpecies').value.trim();
        const note = document.getElementById('animalNote').value.trim();
        if (!species) { alert("Укажите вид"); return; }
        const center = map.getCenter();
        const data = { species, lat: center.lat, lng: center.lng, createdAt: Date.now() };
        if (name) data.name = name;
        if (note) data.note = note;
        animalsRef.push(data).then(() => { animalModal.style.display = 'none'; })
            .catch(err => alert('Ошибка: ' + err.message));
    };

    // Квесты
    const questModal = document.getElementById('questModal');
    document.getElementById('addQuestBtn').onclick = function() {
        if (!isAuthorized) return alert("Только для сотрудников");
        questModal.style.display = 'flex';
        document.getElementById('questName').value = '';
        document.getElementById('questDate').value = '';
        document.getElementById('questLocationName').value = '';
        document.getElementById('questDescription').value = '';
    };
    document.getElementById('closeQuestModal').onclick = function() { questModal.style.display = 'none'; };
    document.getElementById('saveQuestBtn').onclick = function() {
        if (!isAuthorized) return;
        const name = document.getElementById('questName').value.trim();
        const date = document.getElementById('questDate').value.trim();
        const locationName = document.getElementById('questLocationName').value.trim();
        const description = document.getElementById('questDescription').value.trim();
        if (!name) { alert("Укажите название квеста"); return; }
        const center = map.getCenter();
        const data = { name, lat: center.lat, lng: center.lng, createdAt: Date.now() };
        if (date) data.date = date;
        if (locationName) data.locationName = locationName;
        if (description) data.description = description;
        questsRef.push(data).then(() => { questModal.style.display = 'none'; })
            .catch(err => alert('Ошибка: ' + err.message));
    };

    // Здания
    const buildingModal = document.getElementById('buildingModal');
    document.getElementById('addBuildingBtn').onclick = function() {
        if (!isAuthorized) return alert("Только для сотрудников");
        buildingModal.style.display = 'flex';
        document.getElementById('buildingName').value = '';
        document.getElementById('buildingType').value = '';
        document.getElementById('buildingCategory').value = 'public';
        document.getElementById('buildingDescription').value = '';
    };
    document.getElementById('closeBuildingModal').onclick = function() { buildingModal.style.display = 'none'; };
    document.getElementById('saveBuildingBtn').onclick = function() {
        if (!isAuthorized) return;
        const name = document.getElementById('buildingName').value.trim();
        const type = document.getElementById('buildingType').value.trim();
        const category = document.getElementById('buildingCategory').value;
        const description = document.getElementById('buildingDescription').value.trim();
        if (!name) { alert("Укажите название здания"); return; }
        const center = map.getCenter();
        const data = { name, category, lat: center.lat, lng: center.lng, createdAt: Date.now() };
        if (type) data.type = type;
        if (description) data.description = description;
        buildingsRef.push(data).then(() => { buildingModal.style.display = 'none'; })
            .catch(err => alert('Ошибка: ' + err.message));
    };

    // Закрытие модалок по клику вне окна
    window.onclick = function(e) {
        if (e.target === animalModal) animalModal.style.display = 'none';
        if (e.target === questModal) questModal.style.display = 'none';
        if (e.target === buildingModal) buildingModal.style.display = 'none';
    };

    // Периодическое обновление кнопок удаления (на случай динамических попапов)
    setInterval(attachDeleteEvents, 1000);
    console.log("Общая карта загружена. Ожидание авторизации.");
</script>
</body>
</html>
