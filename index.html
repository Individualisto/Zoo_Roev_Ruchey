<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Карта животных – Роев ручей</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #map { flex: 1; z-index: 1; }
        .controls {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid #ccc;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            z-index: 2;
            justify-content: space-between;
        }
        .left-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .info {
            background: #f0f2f5;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 14px;
            color: #1e466e;
        }
        .animal-marker div {
            font-size: 28px;
            text-shadow: 0 0 0 #fff, 0 0 0 #fff, 0 0 0 #fff, 0 0 0 #fff,
                         0 0 4px rgba(0,0,0,0.6), 0 0 4px rgba(0,0,0,0.6),
                         0 0 4px rgba(0,0,0,0.6), 0 0 4px rgba(0,0,0,0.6);
            cursor: default;
            text-align: center;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
            line-height: 1;
        }
        .animal-marker {
            background: none !important;
            border: none !important;
        }
        .nav-link {
            background: #6c757d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            transition: 0.2s;
            font-size: 14px;
        }
        .nav-link:hover { background: #5a6268; }
    </style>
</head>
<body>
<div class="controls">
    <div class="left-controls">
        <div class="info">🐘 Только просмотр животных</div>
        <div class="info">🔄 Данные в реальном времени</div>
        <a href="quest_map.html" class="nav-link">📍 Карта квестов</a>
        <!-- Ссылка на общую карту УДАЛЕНА -->
    </div>
</div>
<div id="map"></div>

<script>
    // ========== НАСТРОЙКИ FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDummyExample_DoNotCopy",
        authDomain: "zoo-map-realtime.firebaseapp.com",
        databaseURL: "https://zoo-map-realtime-default-rtdb.firebaseio.com",
        projectId: "zoo-map-realtime",
        storageBucket: "zoo-map-realtime.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcdef123456"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const animalsRef = db.ref('animals');

    // ========== КАРТА ==========
    const zooMapImageUrl = 'zoo_map.png';
    const imageBounds = [[56.00, 92.80], [56.04, 92.94]];

    const map = L.map('map').setView([56.02, 92.87], 15);
    L.imageOverlay(zooMapImageUrl, imageBounds, { opacity: 1, interactive: false }).addTo(map);
    map.fitBounds(imageBounds);
    map.setMaxBounds(imageBounds);
    map.setMinZoom(14);
    map.setMaxZoom(18);

    const markersMap = new Map();

    // ========== ИКОНКИ ЖИВОТНЫХ ==========
    function getAnimalIcon(species) {
        const s = (species || "").toLowerCase();
        const mapIcons = {
            "зубр": "🦬", "верблюд": "🐪", "муфлон": "🐏", "косуля": "🦌",
            "винторогий козел": "🐐", "горный козел": "🐐", "пятнистый олень": "🦌",
            "марал": "🦌", "овцебык": "🦬", "лось": "🦌", "гуанако": "🦙",
            "альпака": "🦙", "северный олень": "🦌", "коза": "🐐", "пони": "🐴",
            "мини-лошадь": "🐴", "голубой баран": "🐏", "тапир": "🐗", "пекари": "🐗",
            "гну": "🐃", "орикс": "🐐", "зебра": "🦓", "жираф": "🦒", "осёл": "🐴",
            "овца": "🐑", "валлийская овца": "🐑",
            "дикобраз": "🦔", "пака": "🐭", "мара": "🐰", "заяц": "🐇",
            "белка": "🐿️", "белка-летяга": "🐿️", "белка превоста": "🐿️",
            "лемур": "🐒", "потто": "🐒", "галаго": "🐒", "игрунка": "🐒",
            "тамарин": "🐒", "саймири": "🐒", "капуцин": "🐒", "мангобей": "🐒",
            "колобус": "🐒", "гиббон": "🐒", "шимпанзе": "🐒",
            "хаски": "🐕", "самоедская собака": "🐕", "енотовидная собака": "🦝",
            "лесной хорек": "🦡", "носуха": "🦝", "скунс": "🦨", "енот": "🦝",
            "мангуст": "🦡", "генетта": "🐱", "сурикат": "🦡", "фенек": "🦊",
            "волк": "🐺", "белый медведь": "🐻‍❄️", "бурый медведь": "🐻",
            "медведь бурый тяньшанский": "🐻", "медведь гималайский": "🐻",
            "харза": "🦡", "соболь": "🦡", "барсук": "🦡", "выдра": "🦦",
            "рысь": "🐱", "рысь рыжая": "🐱", "сервал": "🐱", "кот": "🐱",
            "кот бенгальский": "🐱", "кот дальневосточный": "🐱", "леопард": "🐆",
            "пума": "🐆", "тигр": "🐅", "ягуар": "🐆", "лев": "🦁",
            "манул": "🐱", "камышовый кот": "🐱", "лиса": "🦊",
            "валлаби": "🦘", "даман": "🐭", "ёж": "🦔"
        };
        let emoji = "🐾";
        for (let [kw, e] of Object.entries(mapIcons)) {
            if (s.includes(kw)) { emoji = e; break; }
        }
        if (emoji === "🐾") {
            if (s.includes("олень") || s.includes("лось")) emoji = "🦌";
            else if (s.includes("коз") || s.includes("баран") || s.includes("овц")) emoji = "🐐";
            else if (s.includes("лошад") || s.includes("пони")) emoji = "🐴";
            else if (s.includes("медвед")) emoji = "🐻";
            else if (s.includes("обезьян") || s.includes("примат")) emoji = "🐒";
            else if (s.includes("собак") || s.includes("волк")) emoji = "🐺";
            else if (s.includes("лис")) emoji = "🦊";
            else if (s.includes("кот") || s.includes("кошк")) emoji = "🐱";
            else if (s.includes("грызун") || s.includes("белк") || s.includes("заяц")) emoji = "🐭";
        }
        return L.divIcon({
            html: `<div>${emoji}</div>`,
            iconSize: [32, 32],
            popupAnchor: [0, -12],
            className: 'animal-marker'
        });
    }

    function createPopupContent(animal) {
        let html = `<div style="min-width:140px;">`;
        if (animal.name) html += `<strong>${escapeHtml(animal.name)}</strong><br>`;
        html += `<span>🧬 ${escapeHtml(animal.species)}</span>`;
        if (animal.note) html += `<br><span style="font-size:13px;color:#555;">📝 ${escapeHtml(animal.note)}</span>`;
        html += `</div>`;
        return html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m){
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function updateOrCreateMarker(animal) {
        const { id, name, species, lat, lng, note } = animal;
        if (!id || lat === undefined || lng === undefined) return;
        const icon = getAnimalIcon(species);
        if (markersMap.has(id)) {
            const marker = markersMap.get(id);
            marker.setLatLng([lat, lng]);
            marker.setPopupContent(createPopupContent(animal));
            marker.setIcon(icon);
            marker.dragging.disable();
            return;
        }
        const marker = L.marker([lat, lng], { draggable: false, icon: icon }).addTo(map);
        marker.bindPopup(createPopupContent(animal));
        marker.animalData = animal;
        markersMap.set(id, marker);
    }

    // ========== СЛУШАТЕЛИ FIREBASE ==========
    animalsRef.on('child_added', function(snapshot) {
        const animal = snapshot.val();
        animal.id = snapshot.key;
        updateOrCreateMarker(animal);
    });

    animalsRef.on('child_changed', function(snapshot) {
        const animal = snapshot.val();
        animal.id = snapshot.key;
        updateOrCreateMarker(animal);
    });

    animalsRef.on('child_removed', function(snapshot) {
        const id = snapshot.key;
        if (markersMap.has(id)) {
            map.removeLayer(markersMap.get(id));
            markersMap.delete(id);
        }
    });

    console.log("Карта животных загружена (только просмотр)");
</script>
</body>
</html>
