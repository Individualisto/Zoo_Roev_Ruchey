<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Карта зоопарка – реальное время</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #map { flex: 1; z-index: 1; }
        .controls {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid #ccc;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            z-index: 2;
            justify-content: space-between;
        }
        .left-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .auth-area { background: #e9ecef; border-radius: 30px; padding: 4px 12px; display: flex; gap: 8px; align-items: center; }
        .auth-area input { padding: 6px 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .auth-area button { background: #2c7a47; padding: 6px 14px; margin: 0; }
        button {
            background: #2c7a47;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #1e5a36; transform: scale(1.02); }
        .info {
            background: #f0f2f5;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 14px;
            color: #1e466e;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 350px;
            max-width: 95%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .modal-card input, .modal-card select, .modal-card textarea {
            width: 100%;
            margin: 8px 0;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-family: inherit;
        }
        .modal-card textarea {
            resize: vertical;
            min-height: 60px;
        }
        .modal-card button {
            width: 100%;
            margin-top: 8px;
        }
        .status {
            font-size: 14px;
            background: #f8d7da;
            padding: 4px 12px;
            border-radius: 20px;
            color: #721c24;
        }
        .status.authorized {
            background: #d4edda;
            color: #155724;
        }
    </style>
</head>
<body>
<div class="controls">
    <div class="left-controls">
        <button id="addAnimalBtn" style="display: none;">➕ Добавить животное</button>
        <div class="info">🐘 Перетаскивайте маркеры — все сотрудники видят изменения</div>
        <div class="info">🔄 Режим реального времени</div>
    </div>
    <div class="auth-area">
        <input type="password" id="passwordInput" placeholder="Пароль сотрудника">
        <button id="loginBtn">🔑 Войти</button>
        <div id="authStatus" class="status">👀 Только просмотр</div>
    </div>
</div>
<div id="map"></div>

<!-- Модальное окно для добавления животного -->
<div id="animalModal" class="modal">
    <div class="modal-card">
        <h3>Новый обитатель</h3>
        <input type="text" id="animalName" list="nameOptions" placeholder="Имя (необязательно)" autocomplete="off">
        <datalist id="nameOptions">
            <option>Бонифаций</option><option>Марфа</option><option>Гоша</option>
            <option>Симба</option><option>Кеша</option><option>Джамбо</option>
            <option>Рокки</option><option>Люся</option><option>Зевс</option>
            <option>Ариэль</option><option>Тиша</option><option>Найда</option>
        </datalist>
        <input type="text" id="animalSpecies" list="speciesOptions" placeholder="Вид животного *" autocomplete="off" required>
        <datalist id="speciesOptions">
            <option>Лев</option><option>Тигр</option><option>Слон</option>
            <option>Жираф</option><option>Пингвин</option><option>Медведь</option>
            <option>Обезьяна</option><option>Зебра</option><option>Волк</option>
            <option>Лиса</option><option>Крокодил</option><option>Фламинго</option>
        </datalist>
        <textarea id="animalNote" placeholder="Краткая информация (необязательно)"></textarea>
        <button id="saveAnimalBtn">✨ Создать на карте</button>
        <button id="closeModalBtn" style="background:#aaa;">Отмена</button>
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ FIREBASE (ЗАМЕНИТЕ НА СВОИ) ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDummyExample_DoNotCopy",
        authDomain: "zoo-map-realtime.firebaseapp.com",
        databaseURL: "https://zoo-map-realtime-default-rtdb.firebaseio.com",
        projectId: "zoo-map-realtime",
        storageBucket: "zoo-map-realtime.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcdef123456"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const animalsRef = db.ref('animals');

    // ========== КАРТА СО СХЕМОЙ ==========
    const zooMapImageUrl = 'zoo_map.png';
    const imageBounds = [[56.00, 92.80], [56.04, 92.94]];

    const map = L.map('map').setView([56.02, 92.87], 15);
    L.imageOverlay(zooMapImageUrl, imageBounds, { opacity: 1, interactive: false }).addTo(map);
    map.fitBounds(imageBounds);
    map.setMaxBounds(imageBounds);
    map.setMinZoom(14);
    map.setMaxZoom(18);

    const markersMap = new Map();
    let isAuthorized = false;
    const CORRECT_PASSWORD = "zoo2026";

    // ========== РАСШИРЕННЫЙ СПИСОК ИКОНОК ==========
    function getAnimalIcon(species) {
        const s = (species || "").toLowerCase();
        const mapIcons = {
            "зубр": "🦬", "верблюд": "🐪", "муфлон": "🐏", "косуля": "🦌",
            "винторогий козел": "🐐", "горный козел": "🐐", "пятнистый олень": "🦌",
            "марал": "🦌", "овцебык": "🦬", "лось": "🦌", "гуанако": "🦙",
            "альпака": "🦙", "северный олень": "🦌", "коза": "🐐", "пони": "🐴",
            "мини-лошадь": "🐴", "голубой баран": "🐏", "тапир": "🐗", "пекари": "🐗",
            "гну": "🐃", "орикс": "🐐", "зебра": "🦓", "жираф": "🦒", "осёл": "🐴",
            "овца": "🐑", "валлийская овца": "🐑",
            "дикобраз": "🦔", "пака": "🐭", "мара": "🐰", "заяц": "🐇",
            "белка": "🐿️", "белка-летяга": "🐿️", "белка превоста": "🐿️",
            "лемур": "🐒", "потто": "🐒", "галаго": "🐒", "игрунка": "🐒",
            "тамарин": "🐒", "саймири": "🐒", "капуцин": "🐒", "мангобей": "🐒",
            "колобус": "🐒", "гиббон": "🐒", "шимпанзе": "🐒",
            "хаски": "🐕", "самоедская собака": "🐕", "енотовидная собака": "🦝",
            "лесной хорек": "🦡", "носуха": "🦝", "скунс": "🦨", "енот": "🦝",
            "мангуст": "🦡", "генетта": "🐱", "сурикат": "🦡", "фенек": "🦊",
            "волк": "🐺", "белый медведь": "🐻‍❄️", "бурый медведь": "🐻",
            "медведь бурый тяньшанский": "🐻", "медведь гималайский": "🐻",
            "харза": "🦡", "соболь": "🦡", "барсук": "🦡", "выдра": "🦦",
            "рысь": "🐱", "рысь рыжая": "🐱", "сервал": "🐱", "кот": "🐱",
            "кот бенгальский": "🐱", "кот дальневосточный": "🐱", "леопард": "🐆",
            "пума": "🐆", "тигр": "🐅", "ягуар": "🐆", "лев": "🦁",
            "манул": "🐱", "камышовый кот": "🐱", "лиса": "🦊",
            "валлаби": "🦘", "даман": "🐭", "ёж": "🦔"
        };
        let emoji = "🐾";
        for (let [kw, e] of Object.entries(mapIcons)) {
            if (s.includes(kw)) { emoji = e; break; }
        }
        if (emoji === "🐾") {
            if (s.includes("олень") || s.includes("лось")) emoji = "🦌";
            else if (s.includes("коз") || s.includes("баран") || s.includes("овц")) emoji = "🐐";
            else if (s.includes("лошад") || s.includes("пони")) emoji = "🐴";
            else if (s.includes("медвед")) emoji = "🐻";
            else if (s.includes("обезьян") || s.includes("примат")) emoji = "🐒";
            else if (s.includes("собак") || s.includes("волк")) emoji = "🐺";
            else if (s.includes("лис")) emoji = "🦊";
            else if (s.includes("кот") || s.includes("кошк")) emoji = "🐱";
            else if (s.includes("грызун") || s.includes("белк") || s.includes("заяц")) emoji = "🐭";
        }
        return L.divIcon({
            html: `<div style="font-size: 28px; text-shadow: 0 0 3px white; cursor: ${isAuthorized ? 'grab' : 'default'}; text-align: center; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));">${emoji}</div>`,
            iconSize: [32, 32],
            popupAnchor: [0, -12],
            className: 'animal-marker'
        });
    }

    // ========== РАБОТА С МАРКЕРАМИ ==========
    function createPopupContent(animal) {
        let html = `<div style="min-width:160px;">`;
        if (animal.name) {
            html += `<strong>🐕 ${escapeHtml(animal.name)}</strong><br>`;
        }
        html += `<span>🧬 ${escapeHtml(animal.species)}</span>`;
        if (animal.note) {
            html += `<br><span style="font-size:13px; color:#555;">📝 ${escapeHtml(animal.note)}</span>`;
        }
        if (isAuthorized) {
            html += `<br><button class="delete-animal-btn" data-id="${animal.id}" style="margin-top:8px; background:#c0392b; color:white; border:none; padding:4px 12px; border-radius:20px; cursor:pointer;">🗑 Удалить</button>`;
        }
        html += `</div>`;
        return html;
    }

    function updateOrCreateMarker(animal) {
        const { id, name, species, lat, lng, note } = animal;
        if (!id || lat === undefined || lng === undefined) return;
        const icon = getAnimalIcon(species);
        if (markersMap.has(id)) {
            const marker = markersMap.get(id);
            marker.setLatLng([lat, lng]);
            marker.setPopupContent(createPopupContent(animal));
            marker.setIcon(icon);
            if (isAuthorized) marker.dragging.enable();
            else marker.dragging.disable();
            return;
        }
        const marker = L.marker([lat, lng], { draggable: isAuthorized, icon: icon }).addTo(map);
        marker.bindPopup(createPopupContent(animal));
        marker.on('dragend', function() {
            if (!isAuthorized) return;
            const newPos = marker.getLatLng();
            animalsRef.child(id).update({ lat: newPos.lat, lng: newPos.lng });
        });
        marker.animalData = animal;   // сохраняем данные
        markersMap.set(id, marker);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m){
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function attachPopupEvents() {
        document.querySelectorAll('.delete-animal-btn').forEach(btn => {
            if (btn.dataset.listener) return;
            btn.dataset.listener = 'true';
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!isAuthorized) return alert("Доступ только для сотрудников");
                const id = btn.dataset.id;
                if (id && confirm('Убрать животное с карты?')) animalsRef.child(id).remove();
            });
        });
    }

    // ========== УПРАВЛЕНИЕ ДОСТУПАМИ (ИСПРАВЛЕНО) ==========
    function setAuthorization(authorized) {
        isAuthorized = authorized;
        const addBtn = document.getElementById('addAnimalBtn');
        const statusDiv = document.getElementById('authStatus');
        if (authorized) {
            addBtn.style.display = 'block';
            statusDiv.innerHTML = '✅ Сотрудник (полный доступ)';
            statusDiv.className = 'status authorized';
            markersMap.forEach(marker => {
                marker.dragging.enable();
                // Используем сохранённый вид животного
                const species = marker.animalData?.species || '';
                marker.setIcon(getAnimalIcon(species));
                marker.setPopupContent(createPopupContent(marker.animalData || {}));
            });
        } else {
            addBtn.style.display = 'none';
            statusDiv.innerHTML = '👀 Только просмотр';
            statusDiv.className = 'status';
            markersMap.forEach(marker => {
                marker.dragging.disable();
                const species = marker.animalData?.species || '';
                marker.setIcon(getAnimalIcon(species));
                marker.setPopupContent(createPopupContent(marker.animalData || {}));
            });
        }
        setTimeout(attachPopupEvents, 100);
    }

    // ========== СЛУШАТЕЛИ FIREBASE ==========
    animalsRef.on('child_added', (snapshot) => {
        const animal = snapshot.val();
        animal.id = snapshot.key;
        updateOrCreateMarker(animal);
        setTimeout(attachPopupEvents, 100);
    });
    animalsRef.on('child_changed', (snapshot) => {
        const animal = snapshot.val();
        animal.id = snapshot.key;
        updateOrCreateMarker(animal);
        setTimeout(attachPopupEvents, 100);
    });
    animalsRef.on('child_removed', (snapshot) => {
        const id = snapshot.key;
        if (markersMap.has(id)) {
            map.removeLayer(markersMap.get(id));
            markersMap.delete(id);
        }
    });

    // ========== АВТОРИЗАЦИЯ ==========
    document.getElementById('loginBtn').onclick = () => {
        const pwd = document.getElementById('passwordInput').value;
        if (pwd === CORRECT_PASSWORD) {
            setAuthorization(true);
            document.getElementById('passwordInput').value = '';
        } else {
            alert('Неверный пароль');
            setAuthorization(false);
        }
    };
    setAuthorization(false); // начальное состояние

    // ========== ДОБАВЛЕНИЕ ЖИВОТНОГО (ИСПРАВЛЕНО) ==========
    const modal = document.getElementById('animalModal');
    const addBtn = document.getElementById('addAnimalBtn');
    const closeModal = document.getElementById('closeModalBtn');
    const saveBtn = document.getElementById('saveAnimalBtn');
    const nameInput = document.getElementById('animalName');
    const speciesInput = document.getElementById('animalSpecies');
    const noteInput = document.getElementById('animalNote');

    addBtn.onclick = () => {
        if (isAuthorized) {
            modal.style.display = 'flex';
            nameInput.value = '';
            speciesInput.value = '';
            noteInput.value = '';
        } else alert("Только для сотрудников");
    };
    closeModal.onclick = () => { modal.style.display = 'none'; };
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

saveBtn.onclick = () => {
    console.log("Кнопка сохранения нажата");
    if (!isAuthorized) {
        alert("Нет прав");
        return;
    }
    const name = nameInput.value.trim();
    const species = speciesInput.value.trim();
    const note = noteInput.value.trim();
    console.log("Имя:", name, "Вид:", species, "Заметка:", note);
    if (!species) {
        alert("Пожалуйста, укажите вид животного");
        return;
    }
    const center = map.getCenter();
    // Создаём объект только с обязательными полями
    const newAnimal = {
        species: species,
        lat: center.lat,
        lng: center.lng,
        createdAt: Date.now()
    };
    // Добавляем имя и заметку только если они не пустые
    if (name) newAnimal.name = name;
    if (note) newAnimal.note = note;
    console.log("Отправка в Firebase:", newAnimal);
    animalsRef.push(newAnimal)
        .then(() => {
            modal.style.display = 'none';
            nameInput.value = '';
            speciesInput.value = '';
            noteInput.value = '';
            console.log("Животное успешно добавлено");
        })
        .catch(err => {
            alert("Ошибка добавления: " + err.message);
            console.error("Ошибка Firebase:", err);
        });
};
    console.log("Отправляем в Firebase:", newAnimal);
    animalsRef.push(newAnimal)
        .then(() => {
            modal.style.display = 'none';
            nameInput.value = '';
            speciesInput.value = '';
            noteInput.value = '';
            console.log("Успешно добавлено");
        })
        .catch(err => {
            alert("Ошибка добавления: " + err.message);
            console.error("Ошибка:", err);
        });
};

    // Периодическое обновление кнопок удаления
    setInterval(() => attachPopupEvents(), 1000);
    console.log("Приложение запущено. Ожидание авторизации.");
</script>
</body>
</html>
