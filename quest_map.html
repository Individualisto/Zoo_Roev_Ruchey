<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Карта квестов – Роев ручей</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #map { flex: 1; z-index: 1; }
        .controls {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid #ccc;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            z-index: 2;
            justify-content: space-between;
        }
        .left-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .info {
            background: #f0f2f5;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 14px;
            color: #1e466e;
        }
        .quest-marker div {
            font-size: 28px;
            text-shadow: 0 0 0 #fff, 0 0 0 #fff, 0 0 0 #fff, 0 0 0 #fff,
                         0 0 4px rgba(0,0,0,0.6), 0 0 4px rgba(0,0,0,0.6),
                         0 0 4px rgba(0,0,0,0.6), 0 0 4px rgba(0,0,0,0.6);
            cursor: default;
            text-align: center;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
            line-height: 1;
        }
        .quest-marker {
            background: none !important;
            border: none !important;
        }
        .nav-link {
            background: #6c757d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            transition: 0.2s;
            font-size: 14px;
        }
        .nav-link:hover { background: #5a6268; }
    </style>
</head>
<body>
<div class="controls">
    <div class="left-controls">
        <div class="info">📍 Только просмотр квестов</div>
        <div class="info">🔄 Данные в реальном времени</div>
        <a href="index.html" class="nav-link">🐘 Карта животных</a>
        <!-- Ссылка на общую карту отсутствует -->
    </div>
</div>
<div id="map"></div>

<script>
    // ========== НАСТРОЙКИ FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDummyExample_DoNotCopy",
        authDomain: "zoo-map-realtime.firebaseapp.com",
        databaseURL: "https://zoo-map-realtime-default-rtdb.firebaseio.com",
        projectId: "zoo-map-realtime",
        storageBucket: "zoo-map-realtime.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcdef123456"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const questsRef = db.ref('quests');

    // ========== КАРТА ==========
    const zooMapImageUrl = 'zoo_map.png';
    const imageBounds = [[56.00, 92.80], [56.04, 92.94]];

    const map = L.map('map').setView([56.02, 92.87], 15);
    L.imageOverlay(zooMapImageUrl, imageBounds, { opacity: 1, interactive: false }).addTo(map);
    map.fitBounds(imageBounds);
    map.setMaxBounds(imageBounds);
    map.setMinZoom(14);
    map.setMaxZoom(18);

    const markersMap = new Map();

    // ========== ИКОНКА КВЕСТА (единая) ==========
    function getQuestIcon() {
        return L.divIcon({
            html: `<div>📍</div>`,
            iconSize: [32, 32],
            popupAnchor: [0, -12],
            className: 'quest-marker'
        });
    }

    // ========== ПОПАП ==========
    function createPopupContent(quest) {
        let html = `<div style="min-width:160px;">`;
        if (quest.name) html += `<strong>${escapeHtml(quest.name)}</strong><br>`;
        if (quest.date) html += `<span>📅 ${escapeHtml(quest.date)}</span><br>`;
        if (quest.locationName) html += `<span>📍 ${escapeHtml(quest.locationName)}</span><br>`;
        if (quest.description) html += `<span style="font-size:13px;color:#555;">📝 ${escapeHtml(quest.description)}</span>`;
        html += `</div>`;
        return html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m){
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== МАРКЕРЫ ==========
    function updateOrCreateMarker(quest) {
        const { id, name, date, locationName, description, lat, lng } = quest;
        if (!id || lat === undefined || lng === undefined) return;
        const icon = getQuestIcon();
        if (markersMap.has(id)) {
            const marker = markersMap.get(id);
            marker.setLatLng([lat, lng]);
            marker.setPopupContent(createPopupContent(quest));
            marker.setIcon(icon);
            marker.dragging.disable();
            return;
        }
        const marker = L.marker([lat, lng], { draggable: false, icon: icon }).addTo(map);
        marker.bindPopup(createPopupContent(quest));
        marker.questData = quest;
        markersMap.set(id, marker);
    }

    // ========== СЛУШАТЕЛИ FIREBASE ==========
    questsRef.on('child_added', function(snapshot) {
        const quest = snapshot.val();
        quest.id = snapshot.key;
        updateOrCreateMarker(quest);
    });

    questsRef.on('child_changed', function(snapshot) {
        const quest = snapshot.val();
        quest.id = snapshot.key;
        updateOrCreateMarker(quest);
    });

    questsRef.on('child_removed', function(snapshot) {
        const id = snapshot.key;
        if (markersMap.has(id)) {
            map.removeLayer(markersMap.get(id));
            markersMap.delete(id);
        }
    });

    console.log("Карта квестов загружена (только просмотр)");
</script>
</body>
</html>
