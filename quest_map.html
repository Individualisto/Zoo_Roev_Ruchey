<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Карта квестов – Роев ручей</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #map { flex: 1; z-index: 1; }
        .controls {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid #ccc;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            z-index: 2;
            justify-content: space-between;
        }
        .left-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .auth-area { background: #e9ecef; border-radius: 30px; padding: 4px 12px; display: flex; gap: 8px; align-items: center; }
        .auth-area input { padding: 6px 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .auth-area button { background: #2c7a47; padding: 6px 14px; margin: 0; }
        button {
            background: #2c7a47;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #1e5a36; transform: scale(1.02); }
        .info {
            background: #f0f2f5;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 14px;
            color: #1e466e;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 350px;
            max-width: 95%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .modal-card input, .modal-card select, .modal-card textarea {
            width: 100%;
            margin: 8px 0;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-family: inherit;
        }
        .modal-card textarea {
            resize: vertical;
            min-height: 60px;
        }
        .modal-card button {
            width: 100%;
            margin-top: 8px;
        }
        .status {
            font-size: 14px;
            background: #f8d7da;
            padding: 4px 12px;
            border-radius: 20px;
            color: #721c24;
        }
        .status.authorized {
            background: #d4edda;
            color: #155724;
        }
    </style>
</head>
<body>
<div class="controls">
    <div class="left-controls">
        <button id="addQuestBtn" style="display: none;">➕ Добавить локацию квеста</button>
        <div class="info">📍 Перетаскивайте маркеры — все сотрудники видят изменения</div>
        <div class="info">🔄 Режим реального времени</div>
    </div>
    <div class="auth-area">
        <input type="password" id="passwordInput" placeholder="Пароль сотрудника">
        <button id="loginBtn">🔑 Войти</button>
        <div id="authStatus" class="status">👀 Только просмотр</div>
    </div>
</div>
<div id="map"></div>

<!-- Модальное окно для добавления локации квеста -->
<div id="questModal" class="modal">
    <div class="modal-card">
        <h3>Новая локация квеста</h3>
        <input type="text" id="questName" placeholder="Название квеста *" autocomplete="off" required>
        <input type="text" id="questDate" placeholder="Дата (например, 15.06.2026)" autocomplete="off">
        <input type="text" id="questLocation" placeholder="Название локации (необязательно)" autocomplete="off">
        <textarea id="questDescription" placeholder="Краткое описание (необязательно)"></textarea>
        <button id="saveQuestBtn">📍 Создать на карте</button>
        <button id="closeModalBtn" style="background:#aaa;">Отмена</button>
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ FIREBASE (ЗАМЕНИТЕ НА СВОИ) ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDummyExample_DoNotCopy",
        authDomain: "zoo-map-realtime.firebaseapp.com",
        databaseURL: "https://zoo-map-realtime-default-rtdb.firebaseio.com",
        projectId: "zoo-map-realtime",
        storageBucket: "zoo-map-realtime.appspot.com",
        messagingSenderId: "123456789012",
        appId: "1:123456789012:web:abcdef123456"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const questsRef = db.ref('quests');   // отдельный узел для квестов

    // ========== КАРТА СО СХЕМОЙ ==========
    const zooMapImageUrl = 'zoo_map.png';
    const imageBounds = [[56.00, 92.80], [56.04, 92.94]];

    const map = L.map('map').setView([56.02, 92.87], 15);
    L.imageOverlay(zooMapImageUrl, imageBounds, { opacity: 1, interactive: false }).addTo(map);
    map.fitBounds(imageBounds);
    map.setMaxBounds(imageBounds);
    map.setMinZoom(14);
    map.setMaxZoom(18);

    const markersMap = new Map();
    let isAuthorized = false;
    const CORRECT_PASSWORD = "zoo2026";   // можно сменить

    // ========== ОБЩАЯ ИКОНКА ДЛЯ ВСЕХ КВЕСТОВ ==========
    function getQuestIcon() {
        return L.divIcon({
            html: `<div style="font-size: 32px; text-shadow: 0 0 3px white; cursor: ${isAuthorized ? 'grab' : 'default'}; text-align: center; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));">📍</div>`,
            iconSize: [32, 32],
            popupAnchor: [0, -12],
            className: 'quest-marker'
        });
    }

    // ========== РАБОТА С МАРКЕРАМИ КВЕСТОВ ==========
    function createPopupContent(quest) {
        let html = `<div style="min-width:180px;">`;
        if (quest.name) {
            html += `<strong>📌 ${escapeHtml(quest.name)}</strong><br>`;
        }
        if (quest.date) {
            html += `<span>📅 ${escapeHtml(quest.date)}</span><br>`;
        }
        if (quest.locationName) {
            html += `<span>📍 ${escapeHtml(quest.locationName)}</span><br>`;
        }
        if (quest.description) {
            html += `<span style="font-size:13px; color:#555;">📝 ${escapeHtml(quest.description)}</span>`;
        }
        if (isAuthorized) {
            html += `<br><button class="delete-quest-btn" data-id="${quest.id}" style="margin-top:8px; background:#c0392b; color:white; border:none; padding:4px 12px; border-radius:20px; cursor:pointer;">🗑 Удалить</button>`;
        }
        html += `</div>`;
        return html;
    }

    function updateOrCreateMarker(quest) {
        const { id, name, date, locationName, description, lat, lng } = quest;
        if (!id || lat === undefined || lng === undefined) return;
        const icon = getQuestIcon();
        if (markersMap.has(id)) {
            const marker = markersMap.get(id);
            marker.setLatLng([lat, lng]);
            marker.setPopupContent(createPopupContent(quest));
            marker.setIcon(icon);
            if (isAuthorized) marker.dragging.enable();
            else marker.dragging.disable();
            return;
        }
        const marker = L.marker([lat, lng], { draggable: isAuthorized, icon: icon }).addTo(map);
        marker.bindPopup(createPopupContent(quest));
        marker.on('dragend', function() {
            if (!isAuthorized) return;
            const newPos = marker.getLatLng();
            questsRef.child(id).update({ lat: newPos.lat, lng: newPos.lng });
        });
        marker.questData = quest;
        markersMap.set(id, marker);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m){
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function attachPopupEvents() {
        document.querySelectorAll('.delete-quest-btn').forEach(btn => {
            if (btn.dataset.listener) return;
            btn.dataset.listener = 'true';
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (!isAuthorized) return alert("Доступ только для сотрудников");
                const id = this.dataset.id;
                if (id && confirm('Убрать локацию квеста с карты?')) questsRef.child(id).remove();
            });
        });
    }

    // ========== УПРАВЛЕНИЕ ДОСТУПАМИ ==========
    function setAuthorization(authorized) {
        isAuthorized = authorized;
        const addBtn = document.getElementById('addQuestBtn');
        const statusDiv = document.getElementById('authStatus');
        if (authorized) {
            addBtn.style.display = 'block';
            statusDiv.innerHTML = '✅ Сотрудник (полный доступ)';
            statusDiv.className = 'status authorized';
            markersMap.forEach(function(marker) {
                marker.dragging.enable();
                marker.setIcon(getQuestIcon());
                marker.setPopupContent(createPopupContent(marker.questData || {}));
            });
        } else {
            addBtn.style.display = 'none';
            statusDiv.innerHTML = '👀 Только просмотр';
            statusDiv.className = 'status';
            markersMap.forEach(function(marker) {
                marker.dragging.disable();
                marker.setIcon(getQuestIcon());
                marker.setPopupContent(createPopupContent(marker.questData || {}));
            });
        }
        setTimeout(attachPopupEvents, 100);
    }

    // ========== СЛУШАТЕЛИ FIREBASE ==========
    questsRef.on('child_added', function(snapshot) {
        const quest = snapshot.val();
        quest.id = snapshot.key;
        updateOrCreateMarker(quest);
        setTimeout(attachPopupEvents, 100);
    });

    questsRef.on('child_changed', function(snapshot) {
        const quest = snapshot.val();
        quest.id = snapshot.key;
        updateOrCreateMarker(quest);
        setTimeout(attachPopupEvents, 100);
    });

    questsRef.on('child_removed', function(snapshot) {
        const id = snapshot.key;
        if (markersMap.has(id)) {
            map.removeLayer(markersMap.get(id));
            markersMap.delete(id);
        }
    });

    // ========== АВТОРИЗАЦИЯ ==========
    document.getElementById('loginBtn').onclick = function() {
        const pwd = document.getElementById('passwordInput').value;
        if (pwd === CORRECT_PASSWORD) {
            setAuthorization(true);
            document.getElementById('passwordInput').value = '';
        } else {
            alert('Неверный пароль');
            setAuthorization(false);
        }
    };
    setAuthorization(false); // начальное состояние

    // ========== ДОБАВЛЕНИЕ ЛОКАЦИИ КВЕСТА ==========
    var modal = document.getElementById('questModal');
    var addBtn = document.getElementById('addQuestBtn');
    var closeModal = document.getElementById('closeModalBtn');
    var saveBtn = document.getElementById('saveQuestBtn');
    var nameInput = document.getElementById('questName');
    var dateInput = document.getElementById('questDate');
    var locationInput = document.getElementById('questLocation');
    var descInput = document.getElementById('questDescription');

    addBtn.onclick = function() {
        if (isAuthorized) {
            modal.style.display = 'flex';
            nameInput.value = '';
            dateInput.value = '';
            locationInput.value = '';
            descInput.value = '';
        } else {
            alert("Только для сотрудников");
        }
    };

    closeModal.onclick = function() {
        modal.style.display = 'none';
    };

    window.onclick = function(e) {
        if (e.target === modal) modal.style.display = 'none';
    };

    saveBtn.onclick = function() {
        console.log("Кнопка сохранения квеста нажата");
        if (!isAuthorized) {
            alert("Нет прав");
            return;
        }
        var name = nameInput.value.trim();
        var date = dateInput.value.trim();
        var locationName = locationInput.value.trim();
        var description = descInput.value.trim();
        if (!name) {
            alert("Пожалуйста, укажите название квеста");
            return;
        }
        var center = map.getCenter();
        var newQuest = {
            name: name,
            date: date || undefined,
            locationName: locationName || undefined,
            description: description || undefined,
            lat: center.lat,
            lng: center.lng,
            createdAt: Date.now()
        };
        console.log("Отправка в Firebase:", newQuest);
        questsRef.push(newQuest)
            .then(function() {
                modal.style.display = 'none';
                nameInput.value = '';
                dateInput.value = '';
                locationInput.value = '';
                descInput.value = '';
                console.log("Локация квеста успешно добавлена");
            })
            .catch(function(err) {
                alert("Ошибка добавления: " + err.message);
                console.error("Ошибка Firebase:", err);
            });
    };

    setInterval(attachPopupEvents, 1000);
    console.log("Карта квестов запущена. Ожидание авторизации.");
</script>
</body>
</html>
